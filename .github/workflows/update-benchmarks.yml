name: Update Benchmark Docs

on:
  # Pushes to dev (direct commits and PR merges) refresh the numbers when they change JS.
  push:
    branches: [dev]
  # Manual rerun from the Actions tab. Dispatch benchmarks the chosen ref and leaves
  # the numbers as an artifact; set commit_back to also push the refreshed docs.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to benchmark (defaults to the branch the workflow runs from)'
        required: false
        default: ''
      commit_back:
        description: 'Commit refreshed docs back to the dispatched branch'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Benchmark numbers can only move when JavaScript changes. Docs-only pushes skip the
  # long benchmark entirely (and don't produce a bot commit that races local work).
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect JS changes
        id: filter
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          # Files changed by this push; fail open on force-push/new-branch edges.
          changed=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null) || changed="diff-unavailable-fail-open.js"
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -q '\.js$'; then
            echo "js=true" >> "$GITHUB_OUTPUT"
          else
            echo "js=false" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    needs: changes
    # Run when manually dispatched, or when the push touched at least one .js file.
    # If the detection job itself failed, fail open and benchmark anyway.
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' &&
        (needs.changes.outputs.js == 'true' || needs.changes.result == 'failure')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v5
        with:
          # push: the pushed branch; workflow_dispatch: the supplied ref (defaults to
          # the branch the dispatch ran from).
          ref: ${{ inputs.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: 'npm'

      - name: Install packages
        run: npm ci

      # Gate the benchmark on a green test run: if tests fail, the workflow stops
      # before benchmarking, so the docs are never refreshed from a broken build.
      - name: Run tests
        run: npm test

      # All tests passed: produce fresh JSON benchmark numbers.
      - name: Run benchmarks (JSON)
        run: |
          node benchmark2.js --json > bench-sequential.json
          node benchmark.js --json > bench-comprehensive.json

      - name: Upload benchmark JSON artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: |
            bench-sequential.json
            bench-comprehensive.json
          retention-days: 30

      - name: Refresh performance tables in README.md + docs/PERFORMANCE.md
        run: node scripts/update-benchmark-docs.js bench-comprehensive.json bench-sequential.json

      - name: Commit refreshed docs
        # Push events commit back to the pushed branch. Manual dispatch only commits
        # when commit_back was requested AND no override ref was supplied (pushing a
        # foreign ref's results onto the dispatched branch would mix branches).
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.commit_back && inputs.ref == '')
        run: |
          git add README.md docs/PERFORMANCE.md
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The ci-skip marker is built by concatenation so this auto-commit does not
          # re-trigger the workflow (and so this file itself contains no literal directive).
          MARKER="[skip"" ci]"
          git commit -m "chore(bench): refresh performance numbers $MARKER"
          git push origin HEAD:${{ github.ref_name }}
