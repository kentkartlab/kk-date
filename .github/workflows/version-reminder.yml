name: Version reminder

# Nudges the author to bump the version inside the PR (developer-driven releases).
# Never fails the check and never blocks merging — it only comments.
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - dev
      - main

concurrency:
  group: version-reminder-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reminder:
    name: Version reminder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Comment version status
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-reminder -->';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            // Read package.json version at a ref via the API (no checkout needed)
            const versionAt = async (ref) => {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path: 'package.json', ref });
                return JSON.parse(Buffer.from(res.data.content, 'base64').toString('utf8')).version;
              } catch (e) {
                core.warning('Could not read package.json at ' + ref + ': ' + e.message);
                return null;
              }
            };

            const baseVersion = await versionAt(pr.base.ref);
            const headVersion = await versionAt(pr.head.sha);

            const defaultBranch = context.payload.repository.default_branch;
            const docsUrl = `${context.payload.repository.html_url}/blob/${defaultBranch}/docs/VERSIONING.md`;

            // Precompute the three bump results from the base version, for copy-paste
            const bumps = (v) => {
              const [a, b, c] = v.split('.').map(Number);
              return { patch: `${a}.${b}.${c + 1}`, minor: `${a}.${b + 1}.0`, major: `${a + 1}.0.0` };
            };

            let body;
            if (baseVersion && headVersion && headVersion !== baseVersion) {
              body = [
                marker,
                '## Version preview',
                '',
                'This PR bumps the version `' + baseVersion + '` -> `' + headVersion + '`.',
                'On merge to `main` it will be published to npm, tagged `v' + headVersion + '`, and a GitHub Release will be created.',
                '',
                '> Optional: add a `## Release Notes` section to this PR description to set custom release notes (otherwise notes are generated from PR titles).',
                '',
                `See [Versioning & Releases](${docsUrl}).`,
              ].join('\n');
            } else {
              const o = baseVersion ? bumps(baseVersion) : null;
              const table = o
                ? [
                    '| Type | Command | Result |',
                    '| --- | --- | --- |',
                    '| patch | `npm version patch --no-git-tag-version` | `' + o.patch + '` |',
                    '| minor | `npm version minor --no-git-tag-version` | `' + o.minor + '` |',
                    '| major | `npm version major --no-git-tag-version` | `' + o.major + '` |',
                  ].join('\n')
                : '`npm version patch --no-git-tag-version` (or `minor` / `major`)';
              body = [
                marker,
                '## No version bump detected',
                '',
                'If this PR should be released, bump the version and commit it:',
                '',
                table,
                '',
                'Then commit and push:',
                '',
                '```bash',
                'git commit -am "chore: bump version"',
                'git push',
                '```',
                '',
                'If this change is not meant to be released (docs, tests, CI, internal refactor), you can ignore this.',
                '',
                `How versioning works: [Versioning & Releases](${docsUrl}).`,
              ].join('\n');
            }

            // Sticky comment: find the existing marked comment; skip if unchanged
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing && existing.body === body) {
              console.log('Comment already up to date.');
              return;
            }
            try {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
              }
            } catch (e) {
              core.warning('Could not post comment: ' + e.message);
            }
